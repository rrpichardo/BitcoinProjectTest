services:

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    # Cap resource usage to prevent runaway memory/CPU consumption
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ticks.raw      --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ticks.features --partitions 1 --replication-factor 1
      echo 'Topics created.'
      "
    restart: "no"

  ingestor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ingestor
    container_name: ingestor
    profiles:
      - live-ingest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    volumes:
      - ../data/raw:/app/data/raw
    # Cap resource usage for the ingestor container
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: on-failure

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: mlflow
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlruns/mlflow_tracking.db
      --artifacts-destination /mlruns/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - ../mlruns:/mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Cap resource usage for the MLflow server
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # FastAPI prediction service (Week 4 thin slice) — serves /health, /predict, /version, /metrics
  api:
    build:
      # Build context is the repo root so the Dockerfile can COPY api/ and models/artifacts/
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: api
    ports:
      # Host 8000 -> container 8000 (uvicorn)
      - "8000:8000"
    environment:
      MODEL_PATH: models/artifacts/lr_pipeline.pkl
      MODEL_VERSION: v1.0
    # Cap resource usage to keep the stack friendly on laptops
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      # Hit /health from inside the container so compose knows when API is ready
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

volumes:
  kafka-data:
